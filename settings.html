<body data-auth="required" class="bg-background text-on-surface font-body-md min-h-screen">
<nav class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-md border-b border-outline-variant/30 shadow-sm">
<div class="flex justify-between items-center h-16 px-gutter max-w-container-max mx-auto">
<a href="/home"" class="text-title-md font-title-md font-bold text-primary tracking-tight">TradePilot</a>
<a href="/dashboard"" class="text-label-md font-label-md text-on-surface-variant hover:text-primary transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-[18px]">arrow_back</span> Back to Dashboard
</a>
</div>
</nav>

<main class="min-h-screen flex justify-center px-gutter pt-24 pb-xl">
<div class="w-full max-w-2xl space-y-lg">
<h1 class="text-headline-lg font-headline-lg text-on-surface">Settings</h1>

<!-- Profile -->
<div class="bg-white border border-outline-variant/20 rounded-xl shadow-sm p-lg">
<h2 class="text-title-md font-title-md mb-md">Profile</h2>
<div id="profile-error" class="hidden bg-error-container text-on-error-container text-label-md font-label-md rounded-xl px-4 py-3 mb-md"></div>
<div id="profile-success" class="hidden bg-secondary-container text-on-secondary-container text-label-md font-label-md rounded-xl px-4 py-3 mb-md"></div>
<div class="flex flex-col gap-md">
<div>
<label class="block text-label-md font-label-md text-on-surface-variant mb-xs" for="settings-name">Full name</label>
<input id="settings-name" type="text" class="w-full border border-outline-variant/40 rounded-xl px-4 py-3 text-body-md focus:ring-2 focus:ring-primary focus:outline-none"/>
</div>
<div>
<label class="block text-label-md font-label-md text-on-surface-variant mb-xs">Email</label>
<input id="settings-email" type="email" disabled class="w-full border border-outline-variant/40 rounded-xl px-4 py-3 text-body-md bg-surface-container-low text-on-surface-variant"/>
<p class="text-label-sm text-on-surface-variant mt-1">Email address can't be changed in this demo.</p>
</div>
<button id="save-profile-btn" class="self-start px-6 py-3 bg-primary text-on-primary rounded-xl font-label-md text-label-md font-bold hover:opacity-90 transition-all">
Save Changes
</button>
</div>
</div>

<!-- Password -->
<div class="bg-white border border-outline-variant/20 rounded-xl shadow-sm p-lg">
<h2 class="text-title-md font-title-md mb-md">Change Password</h2>
<div id="password-error" class="hidden bg-error-container text-on-error-container text-label-md font-label-md rounded-xl px-4 py-3 mb-md"></div>
<div id="password-success" class="hidden bg-secondary-container text-on-secondary-container text-label-md font-label-md rounded-xl px-4 py-3 mb-md"></div>
<div class="flex flex-col gap-md">
<div>
<label class="block text-label-md font-label-md text-on-surface-variant mb-xs" for="current-password">Current password</label>
<input id="current-password" type="password" class="w-full border border-outline-variant/40 rounded-xl px-4 py-3 text-body-md focus:ring-2 focus:ring-primary focus:outline-none"/>
</div>
<div>
<label class="block text-label-md font-label-md text-on-surface-variant mb-xs" for="new-password">New password</label>
<input id="new-password" type="password" class="w-full border border-outline-variant/40 rounded-xl px-4 py-3 text-body-md focus:ring-2 focus:ring-primary focus:outline-none" placeholder="At least 8 characters, with a letter and a number"/>
</div>
<button id="save-password-btn" class="self-start px-6 py-3 bg-primary text-on-primary rounded-xl font-label-md text-label-md font-bold hover:opacity-90 transition-all">
Update Password
</button>
</div>
</div>

<!-- Appearance -->
<div class="bg-white border border-outline-variant/20 rounded-xl shadow-sm p-lg">
<h2 class="text-title-md font-title-md mb-md">Appearance</h2>
<div class="flex items-center justify-between">
<div>
<p class="text-body-md font-body-md text-on-surface">Dark mode</p>

</div>

</button>
</div>
</div>

<!-- Account -->

<h2 class="text-title-md font-title-md mb-md">Account</h2>
<button id="settings-logout-btn" class="px-6 py-3 border border-error text-error rounded-xl font-label-md text-label-md font-bold hover:bg-error hover:text-white transition-all">
Log Out
</button>
</div>
</div>
</main>

<script src="assets/auth-guard.js"></script>
<script>
(function () {
  const API_BASE = '/api/auth';

  document.addEventListener('DOMContentLoaded', function () {
    const nameInput = document.getElementById('settings-name');
    const emailInput = document.getElementById('settings-email');
    const profileError = document.getElementById('profile-error');
    const profileSuccess = document.getElementById('profile-success');
    const saveProfileBtn = document.getElementById('save-profile-btn');

    const currentPasswordInput = document.getElementById('current-password');
    const newPasswordInput = document.getElementById('new-password');
    const passwordError = document.getElementById('password-error');
    const passwordSuccess = document.getElementById('password-success');
    const savePasswordBtn = document.getElementById('save-password-btn');

    const darkModeToggle = document.getElementById('dark-mode-toggle');
    const darkModeKnob = document.getElementById('dark-mode-knob');
    const logoutBtn = document.getElementById('settings-logout-btn');

    function authHeaders(extra) {
      const h = window.TradePilotAuth ? window.TradePilotAuth.authHeader() : {};
      return { ...h, ...(extra || {}) };
    }

    // Pre-fill current user info
    const user = window.TradePilotAuth ? window.TradePilotAuth.getUser() : null;
    if (user) {
      nameInput.value = user.name || '';
      emailInput.value = user.email || '';
    }

    saveProfileBtn.addEventListener('click', async () => {
      profileError.classList.add('hidden');
      profileSuccess.classList.add('hidden');
      saveProfileBtn.disabled = true;
      saveProfileBtn.textContent = 'Saving...';

      try {
        const res = await fetch(`${API_BASE}/profile`, {
          method: 'PATCH',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({ name: nameInput.value })
        });
        const data = await res.json();

        if (!res.ok) {
          profileError.textContent = data.error || 'Could not save changes.';
          profileError.classList.remove('hidden');
          return;
        }

        localStorage.setItem('tradepilot_token', data.token);
        localStorage.setItem('tradepilot_user', JSON.stringify(data.user));
        profileSuccess.textContent = 'Saved!';
        profileSuccess.classList.remove('hidden');
      } catch (err) {
        profileError.textContent = 'Could not reach the server. Make sure it is running (npm start).';
        profileError.classList.remove('hidden');
      } finally {
        saveProfileBtn.disabled = false;
        saveProfileBtn.textContent = 'Save Changes';
      }
    });

    savePasswordBtn.addEventListener('click', async () => {
      passwordError.classList.add('hidden');
      passwordSuccess.classList.add('hidden');
      savePasswordBtn.disabled = true;
      savePasswordBtn.textContent = 'Updating...';

      try {
        const res = await fetch(`${API_BASE}/change-password`, {
          method: 'POST',
          headers: authHeaders({ 'Content-Type': 'application/json' }),
          body: JSON.stringify({
            currentPassword: currentPasswordInput.value,
            newPassword: newPasswordInput.value
          })
        });
        const data = await res.json();

        if (!res.ok) {
          passwordError.textContent = data.error || 'Could not update password.';
          passwordError.classList.remove('hidden');
          return;
        }

        currentPasswordInput.value = '';
        newPasswordInput.value = '';
        passwordSuccess.textContent = 'Password updated!';
        passwordSuccess.classList.remove('hidden');
      } catch (err) {
        passwordError.textContent = 'Could not reach the server. Make sure it is running (npm start).';
        passwordError.classList.remove('hidden');
      } finally {
        savePasswordBtn.disabled = false;
        savePasswordBtn.textContent = 'Update Password';
      }
    });

    // Dark mode toggle (persisted via localStorage, applied as a class on <html>)
    function applyDarkMode(enabled) {
      document.documentElement.classList.toggle('dark', enabled);
      darkModeKnob.style.transform = enabled ? 'translateX(1.5rem)' : 'translateX(0)';
      darkModeToggle.classList.toggle('bg-primary', enabled);
      darkModeToggle.classList.toggle('bg-outline-variant/40', !enabled);
    }
    const darkModeEnabled = localStorage.getItem('tradepilot_dark_mode') === 'true';
    applyDarkMode(darkModeEnabled);

    darkModeToggle.addEventListener('click', () => {
      const newState = localStorage.getItem('tradepilot_dark_mode') !== 'true';
      localStorage.setItem('tradepilot_dark_mode', String(newState));
      applyDarkMode(newState);
    });

    logoutBtn.addEventListener('click', () => {
      if (confirm('Log out of TradePilot?')) {
        window.TradePilotAuth.logout();
      }
    });
  });
})();
</script>
</body>
</html>
